services:
  rdt-lab:
    build:
      context: .
    image: rdt-lab:latest
    container_name: rdt-lab
    ports:
      - "${PORT:-8888}:3000"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
    volumes:
      - rdt-lab-data:/app/data
    restart: unless-stopped

volumes:
  rdt-lab-data:
